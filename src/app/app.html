<!-- Lightbox global -->
<div class="lightbox-overlay" *ngIf="lightbox.isOpen" (click)="lightbox.close()">
  <button class="lightbox-close" (click)="lightbox.close()">✕</button>
  <button class="lightbox-arrow lightbox-prev" (click)="onPrev($event)">❮</button>
  <div class="lightbox-content" (click)="$event.stopPropagation()">
    <img [src]="lightbox.images[lightbox.currentIndex]" alt="Imagen ampliada">
  </div>
  <button class="lightbox-arrow lightbox-next" (click)="onNext($event)">❯</button>
  <div class="lightbox-dots" (click)="$event.stopPropagation()">
    <span
      *ngFor="let img of lightbox.images; let i = index"
      class="lightbox-dot"
      [class.active]="i === lightbox.currentIndex"
      (click)="lightbox.goTo(i)"
    ></span>
  </div>
  <div class="lightbox-counter">{{ lightbox.currentIndex + 1 }} / {{ lightbox.images.length }}</div>
</div>
